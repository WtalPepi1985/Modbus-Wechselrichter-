esphome:
  name: garage-wr-modbus
  friendly_name: Garage_WR_Modbus
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: status_leds
          effect: "rainbow"
      - wait_until:
          condition:
            lambda: 'return !id(boot_splash);'
          timeout: 30s
      - lambda: 'id(boot_splash) = false;'
      - light.turn_off: status_leds
      - delay: 200ms
      - switch.turn_on: psi_remote

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: "Svxs0Uwpg2prKO9+mmJYAPWVPPNLfCOugpY5Ai8Qyi0="

ota:
  - platform: esphome
    password: "06b59e6ec087116c612b4bbea21c4364"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Garage-WR-Modbus"
    password: "12345678"

captive_portal:

web_server:
  port: 80
  version: 2

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin


esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

i2c:
  sda: 4
  scl: 5
  scan: true

uart:
  id: modbus_uart
  tx_pin: 21
  rx_pin: 20
  baud_rate: 115200
  parity: NONE
  stop_bits: 1

modbus:
  id: modbus1
  flow_control_pin: 6

modbus_controller:
  - id: psi
    address: 3
    modbus_id: modbus1
    update_interval: 5s

globals:
  - id: modbus_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: psi_error
    type: bool
    restore_value: no
    initial_value: "false"

  - id: psi_working
    type: bool
    restore_value: no
    initial_value: "false"

  - id: last_modbus_update
    type: unsigned long
    restore_value: no
    initial_value: "0"

  - id: boot_splash
    type: bool
    restore_value: no
    initial_value: "true"

script:
  - id: wr_einschalten
    then:
      - switch.turn_on: psi_remote
      - delay: 200ms
      - switch.turn_on: psi_switch

  - id: wr_ausschalten
    then:
      - switch.turn_off: psi_switch
      - delay: 200ms
      - switch.turn_off: psi_remote

  - id: wr_toggle
    then:
      - if:
          condition:
            switch.is_on: psi_switch
          then:
            - script.execute: wr_ausschalten
          else:
            - script.execute: wr_einschalten

binary_sensor:
  - platform: gpio
    pin:
      number: 10
      mode: INPUT
    name: "WR Taster"
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(boot_splash);'
            then:
              - lambda: 'id(boot_splash) = false;'
            else:
              - script.execute: wr_toggle

sensor:

  - platform: homeassistant
    id: ha_battery
    entity_id: sensor.dl_a77a12010a1c_batterie

  - platform: homeassistant
    id: ha_solar_power
    entity_id: sensor.smartsolar_hq1741d81mi_power

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI DC Spannung"
    id: psi_dc_voltage
    address: 0x3108
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "V"
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI DC Strom"
    id: psi_dc_current
    address: 0x3109
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A"
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI DC Leistung"
    id: psi_dc_power
    address: 0x310A
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "W"
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI AC Spannung"
    id: psi_ac_voltage
    address: 0x310C
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "V"
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI AC Strom"
    id: psi_ac_current
    address: 0x310D
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A"
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI AC Leistung"
    id: psi_ac_power
    address: 0x310E
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "W"
    filters:
      - multiply: 0.01
    on_value:
      then:
        - lambda: |-
            id(modbus_ok) = true;
            id(last_modbus_update) = millis();

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI Temperatur"
    id: psi_temp
    address: 0x3111
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "°C"
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI MOSFET Temperatur"
    id: psi_mos_temp
    address: 0x3112
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "°C"
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: psi
    id: psi_status
    name: "PSI Status Raw"
    address: 0x3202
    register_type: read
    value_type: U_WORD
    on_value:
      then:
        - lambda: |-
            int s = (int)x;
            id(psi_working) = (s & 0x01);
            id(psi_error)   = (s & 0x02) || (s & 0x80) || (s & 0x100) ||
                               (s & 0x400) || (s & 0x800) || (s & 0x20);

  - platform: template
    name: "PSI Wirkungsgrad"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    lambda: |-
      if (id(psi_dc_power).state > 0)
        return (id(psi_ac_power).state / id(psi_dc_power).state) * 100.0;
      return 0;

switch:
  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI Remote Mode"
    id: psi_remote
    register_type: coil
    address: 0x0011

  - platform: modbus_controller
    modbus_controller_id: psi
    name: "PSI Wechselrichter"
    id: psi_switch
    register_type: coil
    address: 0x000F


button:
  - platform: template
    name: "BLE Reset"
    icon: "mdi:bluetooth-connect"
    on_press:
      - esp32_ble_tracker.stop_scan:
      - delay: 2s
      - esp32_ble_tracker.start_scan:
light:
  - platform: esp32_rmt_led_strip
    pin: 7
    num_leds: 8
    rgb_order: GRB
    chipset: ws2812
    id: status_leds
    name: "PSI Status LED"
    default_transition_length: 0s
    effects:
      - addressable_lambda:
          name: "rotating_green"
          update_interval: 80ms
          lambda: |-
            static int pos = 0;
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, 20, 0);
            }
            it[pos] = Color(0, 255, 0);
            pos = (pos + 1) % it.size();
      - addressable_lambda:
          name: "blinking_red"
          update_interval: 500ms
          lambda: |-
            static bool on = false;
            on = !on;
            for (int i = 0; i < it.size(); i++) {
              it[i] = on ? Color(255, 0, 0) : Color(0, 0, 0);
            }
      - addressable_rainbow:
          name: "rainbow"
          speed: 10
          width: 50

interval:
  - interval: 10s
    then:
      - lambda: |-
          if (id(last_modbus_update) > 0 &&
              (millis() - id(last_modbus_update)) > 15000) {
            id(modbus_ok) = false;
          }

  - interval: 1s
    then:
      - lambda: |-
          if (id(boot_splash)) return;
          bool ha_ok = global_api_server->is_connected();

          if (!id(modbus_ok) || !ha_ok) {
            // Kein Modbus oder kein HA -> rot blinken
            auto call = id(status_leds).turn_on();
            call.set_effect("blinking_red");
            call.perform();
          } else if (id(psi_error)) {
            // WR Fehler -> rot dauerhaft
            auto call = id(status_leds).turn_on();
            call.set_effect("none");
            call.set_rgb(1.0, 0.0, 0.0);
            call.set_brightness(1.0);
            call.perform();
          } else if (id(psi_working)) {
            // WR working (bit0) -> grün kreisend
            auto call = id(status_leds).turn_on();
            call.set_effect("rotating_green");
            call.perform();
          } else {
            // Standby -> blau
            auto call = id(status_leds).turn_on();
            call.set_effect("none");
            call.set_rgb(0.0, 0.0, 1.0);
            call.set_brightness(0.3);
            call.perform();
          }

  - interval: 15min
    then:
      - esp32_ble_tracker.stop_scan:
      - delay: 2s
      - esp32_ble_tracker.start_scan:
font:

  - file: "gfonts://Roboto"
    id: font_small
    size: 12

  - file: "gfonts://Roboto"
    id: font_big
    size: 18

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      if (id(boot_splash)) {
        it.printf(64, 18, id(font_small), TextAlign::CENTER, "Powered by");
        it.printf(64, 38, id(font_big),   TextAlign::CENTER, "WtalPepi1985");
        return;
      }

      if (!id(modbus_ok)) {
        it.printf(64, 16, id(font_big), TextAlign::CENTER, "MODBUS");
        it.printf(64, 42, id(font_big), TextAlign::CENTER, "FEHLER");
        return;
      }

      if (id(psi_error)) {
        it.printf(64, 16, id(font_big), TextAlign::CENTER, "WR");
        it.printf(64, 42, id(font_big), TextAlign::CENTER, "FEHLER");
        return;
      }

      it.printf(0,0,id(font_small),"DC %.1fV", id(psi_dc_voltage).state);
      it.printf(64,0,id(font_small),"AC %.0fV", id(psi_ac_voltage).state);

      it.line(0,15,128,15);

      if (id(psi_ac_power).state < 1.0) {
        it.printf(40,28,id(font_big),"AUS");
      } else {
        it.printf(20,28,id(font_big),"%.0fW", id(psi_ac_power).state);
      }
      it.line(0,49,128,49);
      it.printf(0,52,id(font_small),"%.0f%%", id(ha_battery).state);
      it.printf(128,52,id(font_small),TextAlign::RIGHT,"%.0fW", id(ha_solar_power).state);
